name: Checksums for snapshots

on:
  push:
    branches:
      - master
      - main
  pull_request: {}

jobs:
  validate-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry and project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          # Ensure Poetry creates the venv inside the project for CI
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Ensure dados directory exists
        run: mkdir -p dados

      - name: Generate deterministic snapshots
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tmp_snapshots/snapshots_test"
          SNAPSHOT_DIR="$GITHUB_WORKSPACE/tmp_snapshots/snapshots_test" \
            poetry run python scripts/generate_ci_snapshot.py

      - name: Validate snapshots manifest
        run: |
          poetry run python scripts/validate_snapshots.py \
            --dir "$GITHUB_WORKSPACE/tmp_snapshots/snapshots_test" \
            --manifest snapshots/checksums.json \
            --allow-external

      - name: Run snapshot-generation integration test (fast)
        run: |
          # run only the new integration test to fail fast on regressions
          poetry run pytest -q tests/test_generate_ci_snapshot_integration.py::test_generate_ci_snapshot_writes_metadata -q

      - name: Run tests
        run: |
          # Run tests inside Poetry-managed venv so installed deps (pandas) are visible
          # Enable metadata DB check in CI
          export CHECK_METADATA_DB=1
          poetry run pytest -q

      - name: Upload snapshot diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diagnostics
          path: |
            snapshots/**
            tmp_snapshots/snapshots_test/**
            reports/**
