name: Checksums for snapshots

on:
  push:
    branches:
      - master
      - main
  pull_request: {}

jobs:
  validate-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry and project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          # Ensure Poetry creates the venv inside the project for CI
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Validate snapshots manifest
        run: |
          # Use temporary CI snapshots dir if provided by earlier steps/tests,
          # otherwise fallback to the repo `snapshots/` directory.
          if [ -d "$GITHUB_WORKSPACE/tmp_snapshots/snapshots_test" ]; then
            DIR="$GITHUB_WORKSPACE/tmp_snapshots/snapshots_test"
          else
            DIR="snapshots"
          fi
          poetry run python scripts/validate_snapshots.py --dir "$DIR" --manifest snapshots/checksums.json --allow-external

      - name: Run tests
        run: |
          # Run tests inside Poetry-managed venv so installed deps (pandas) are visible
          poetry run pytest -q

      - name: Upload snapshot diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diagnostics
          path: |
            snapshots/**
            reports/**
