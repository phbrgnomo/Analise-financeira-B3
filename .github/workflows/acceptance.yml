name: Acceptance

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - 'src/**'
      - 'snapshots/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  acceptance:
    name: Acceptance E2E + Snapshot Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache poetry and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Initialize DB (optional)
        run: |
          python scripts/init_ingest_db.py --db dados/data.db || true

      - name: Generate snapshots (deterministic)
        run: |
          mkdir -p "$RUNNER_TEMP/snapshots_test"
          set -euo pipefail
          export SNAPSHOT_DIR="$RUNNER_TEMP/snapshots_test"
          # Run the mocked quickstart integration which copies the sample
          # snapshot into the target dir (tests/integration/test_quickstart_mocked.py)
          NETWORK_MODE=playback poetry run pytest -q tests/integration -k quickstart_mocked --maxfail=1

      - name: Validate snapshots manifest
        run: |
          python scripts/validate_snapshots.py --dir "$RUNNER_TEMP/snapshots_test" --manifest snapshots/checksums.json --allow-external

      - name: Run acceptance tests (E2E)
        run: |
          mkdir -p reports
          NETWORK_MODE=playback poetry run pytest -q tests/test_integration_e2e_checksum.py --maxfail=1 --junitxml=reports/junit.xml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: reports/**

      - name: Upload snapshots artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: ${{ runner.temp }}/snapshots_test/**
