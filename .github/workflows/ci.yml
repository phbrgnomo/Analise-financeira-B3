name: CI

on:
  push:
    branches: [master, main]
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --no-interaction
      - run: poetry run pre-commit run --all-files --show-diff-on-failure
      - run: poetry run ruff check . --exclude "*.md"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --no-interaction
      - run: |
          mkdir -p reports
          NETWORK_MODE=playback poetry run pytest -q --maxfail=1 --junitxml=reports/junit.xml
      - name: CLI smoke test
        run: |
          echo "# register a dummy provider and run ingest via CLI"
          # use the canonical script in the repository to avoid runtime typos
          poetry run python scripts/register_dummy.py
          poetry run python -c "import sys; from src.ingest.pipeline import ingest_command; sys.exit(ingest_command('TEST', 'dummy'))"
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/**

  integration:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --no-interaction
      - run: |
          mkdir -p "$RUNNER_TEMP/snapshots_test"
          NETWORK_MODE=playback poetry run pytest -q tests/integration -k quickstart_mocked --maxfail=1
      - id: snapshot_dir
        run: echo "snapshot_dir=$RUNNER_TEMP/snapshots_test" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: ${{ steps.snapshot_dir.outputs.snapshot_dir }}
