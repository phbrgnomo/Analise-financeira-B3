name: CI

on:
  push:
    branches: [master, main]
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry lock
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --extras notebook
      - run: poetry run pre-commit run --all-files --show-diff-on-failure
      - run: poetry run ruff check . --exclude "*.md,examples/notebooks/*,outputs/*,reports/*"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry lock
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --extras notebook
          # Install kernel for papermill notebook execution in CI
          poetry run python -m pip install --upgrade ipykernel
          poetry run python -m ipykernel install --user --name python3 --display-name "Python 3"
      - name: Ensure dados directory exists
        run: mkdir -p dados

      - name: Apply migrations to default DB
        run: |
          # centralized migration helper script – run under poetry so `src` is
          # on PYTHONPATH and dependencies are available.
          poetry run python scripts/apply_migrations.py

      - run: |
          mkdir -p reports
          PAPERMILL=1 NETWORK_MODE=playback poetry run pytest -q --maxfail=1 --junitxml=reports/junit.xml
      - name: CLI smoke test
        run: |
          echo "# smoke test using built-in dummy provider"
          # the dummy adapter is now registered automatically by the factory,
          # so we can call the ingest command directly.  the helper script is
          # kept for manual experimentation but is not required here.
          poetry run python -c "import sys; from src.ingest.pipeline import ingest_command; sys.exit(ingest_command('TEST', 'dummy', dry_run=True))"

      - name: Quickstart example smoke test
        run: |
          echo "# smoke test running examples/run_quickstart_example.sh"
          mkdir -p outputs logs snapshots
          ./examples/run_quickstart_example.sh --no-network --format json

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/**

      - name: Upload quickstart artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-artifacts
          path: |
            outputs/**
            logs/**
            snapshots/**

  integration:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --extras notebook
      - name: Ensure dados directory exists
        run: mkdir -p dados

      - name: Apply migrations to default DB
        run: |
          # centralized migration helper script
          poetry run python scripts/apply_migrations.py

      - run: |
          mkdir -p "$RUNNER_TEMP/snapshots_test"
          export SNAPSHOT_DIR="$RUNNER_TEMP/snapshots_test"
          NETWORK_MODE=playback poetry run pytest -q tests/integration -k quickstart_mocked --maxfail=1
          poetry run python scripts/generate_ci_snapshot.py
          poetry run python scripts/validate_snapshots.py --dir "$SNAPSHOT_DIR" --manifest snapshots/checksums.json --allow-external
      - id: snapshot_dir
        run: echo "snapshot_dir=$RUNNER_TEMP/snapshots_test" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: snapshots
          path: ${{ steps.snapshot_dir.outputs.snapshot_dir }}
